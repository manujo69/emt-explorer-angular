<div class="flex items-start gap-3 bg-red-900/30 border border-red-700 rounded-lg p-4" role="alert">
  <svg class="h-5 w-5 text-red-400 shrink-0 mt-0.5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
    <path fill-rule="evenodd"
      d="M10 18a8 8 0 100-16 8 8 0 000 16zm-.75-4.75a.75.75 0 001.5 0v-4.5a.75.75 0 00-1.5 0v4.5zm0-7.5a.75.75 0 001.5 0 .75.75 0 00-1.5 0z"
      clip-rule="evenodd" />
  </svg>
  <div class="flex-1 min-w-0">
    <p class="text-red-300 text-sm">{{ message() }}</p>
    <button
      type="button"
      class="mt-2 text-xs text-red-400 underline hover:text-red-200 transition-colors"
      (click)="retry.emit()"
    >
      Reintentar
    </button>
  </div>
</div>
