<mgl-marker [lngLat]="lngLat()">
  <svg
    [attr.width]="size()"
    [attr.height]="size()"
    viewBox="0 0 40 40"
    [attr.aria-label]="title()"
    role="img"
  >
    <title>{{ title() }}</title>
    <circle cx="20" cy="20" r="18" [attr.fill]="fillColor()" stroke="white" stroke-width="3" />
    <text
      x="20"
      y="26"
      text-anchor="middle"
      font-size="14"
      font-weight="bold"
      font-family="sans-serif"
      [attr.fill]="textColor()"
    >{{ bus().codLinea }}</text>
  </svg>
</mgl-marker>
