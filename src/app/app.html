<div class="h-screen flex flex-col bg-gray-950">
  <header class="bg-gray-900 border-b border-gray-800 px-4 py-3 flex items-center gap-4 shrink-0 z-10">
    <div class="flex items-center gap-2 shrink-0">
      <span class="text-white font-bold tracking-tight">EMT Málaga</span>
      <span class="text-gray-500 text-xs">Explorer</span>
    </div>
    <app-linea-selector />
    <app-sentido-filter />
  </header>
  <main class="flex-1 relative overflow-hidden">
    @if (!routeReady()) {
      <app-map-skeleton />
    }
    <router-outlet (activate)="routeReady.set(true)" />
  </main>
</div>
